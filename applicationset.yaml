apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: devtools-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/devops-tashtiot/devtools-provision
        revision: main
        directories:
          - path: devtools/*
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
    spec:
      project: default
      sources:
        - repoURL: https://github.com/devops-tashtiot/devtools-provision
          targetRevision: main
          path: '{{path}}'
          helm:
            valueFiles:
              - values.yaml
              - $definition/devtools/{{path.basename}}/values.yaml
        - repoURL: https://github.com/devops-tashtiot/devtools-definition
          targetRevision: main
          ref: definition
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
