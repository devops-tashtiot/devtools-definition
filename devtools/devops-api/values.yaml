# Overrides for the devops-api umbrella chart.
# Merged on top of devtools-provision/devtools/devops-api/values.yaml by ArgoCD.
#
# image.repository/tag reference GitHub Releases published from
# https://github.com/devops-tashtiot/devops-api — bump image.tag here to
# roll out a new release.

example-fast-api:
  image:
    repository: ghcr.io/devops-tashtiot/devops-api
    tag: "check-api-new-api-library-version-716ba27"
    pullPolicy: IfNotPresent

  # Per-environment values for the minikube-on-EC2 cluster — placeholders in
  # devtools-provision/devtools/devops-api/values.yaml, filled in here.
  #
  # *_API_URL values below now point at each tool's REAL public
  # *.devopstashtiot.page hostname — not the raw in-cluster Service DNS
  # (<service>.<namespace>.svc.cluster.local) they used before 2026-07-14.
  #
  # Why they were on Service DNS originally: devops-api runs as a pod in this
  # same cluster, and routing its own calls back out through the public
  # hostname bounced them through the Cloudflare Tunnel into Cloudflare
  # Access's interactive email-verify page — Access is enforced at
  # Cloudflare's edge before the tunnel ever reaches this cluster's ingress,
  # so there's no ingress-side header (e.g. a CF-Access-Client-Id/Secret
  # service token) that can satisfy it after the fact.
  #
  # Why they're back on the public hostname now: the cluster's own CoreDNS
  # (kube-system/coredns ConfigMap, applied directly via kubectl — not
  # tracked in any GitOps repo, since CoreDNS isn't managed by
  # clusters-provision/clusters-definition, it's minikube's own addon) now
  # carries `rewrite` rules that resolve every one of these
  # *.devopstashtiot.page hostnames straight to ingress-nginx-controller's
  # in-cluster Service IP for any caller running inside the cluster —
  # bypassing the Cloudflare Tunnel and Access entirely for in-cluster
  # traffic, while external/public resolution via real Cloudflare DNS is
  # untouched. Routing through ingress-nginx-controller (rather than
  # straight to each tool's own backend Service) matters because that's
  # where the cluster's real Cloudflare Origin Certificate for
  # *.devopstashtiot.page is actually mounted (clusters-provision/clusters/
  # ingress-nginx/templates/origin-cert-secret.yaml) — going straight to a
  # backend Service (e.g. bitbucket.bitbucket.svc.cluster.local) would hit
  # no TLS listener at all, since every devtool's own Service is plain HTTP
  # only (TLS terminates at Cloudflare/ingress-nginx, never on the backend
  # itself). Going through ingress-nginx-controller instead means normal
  # host-based Ingress routing reaches the right backend AND on the right
  # port, so no per-tool port override is needed here even for sonarqube
  # (9000)/artifactory (8082) — this is real https:// end-to-end, not a
  # protocol downgrade. The Origin Cert is signed by Cloudflare's own
  # private Origin CA, which isn't in any standard trust store — devops-api's
  # Dockerfile installs it explicitly (see that file's own comment) so
  # httpx's default certificate verification actually passes instead of
  # needing verify=False.
  #
  # This whole rewrite is a workaround, not a permanent fix: AWS Control
  # Tower now permits creating a private Route53 hosted zone in this account
  # (it didn't when the original in-cluster-Service-DNS workaround was
  # written), which would be the correct long-term replacement for these
  # CoreDNS rewrites — a real private hosted zone instead of hand-maintained
  # rewrite rules on the cluster's addon DNS. The root problem these values
  # keep working around is the same one that blocked Bitbucket's own
  # git-over-HTTPS earlier: Cloudflare Access's email-OTP wall has no
  # service-token bypass usable by devops-api's own outbound calls, for any
  # tool, at any public *.devopstashtiot.page host.
  env:
    # Point at the in-cluster MinIO devtool (clusters-provision/clusters/minio)
    # instead of localhost (local dev) or real AWS S3 — its
    # "platform-clients"/"platform-devops-team" buckets are anonymous
    # public-read/write (mc anonymous set public), so devops-api's existing
    # httpx-based fetch/upload code works unchanged, just against
    # minio.minio.svc.cluster.local instead of localhost:9100.
    ARTIFACTORY_API_URL: "https://artifactory.devopstashtiot.page"
    ARTIFACTORY_LDAP_SETTING_NAME: "ldap-ad"
    ARTIFACTORY_S3_XRAY_UPDATES_BASE_URL: "http://minio.minio.svc.cluster.local:9000/platform-devops-team/xray-vulnerability-updates"

    BITBUCKET_API_URL: "https://bitbucket.devopstashtiot.page"
    # Every *_USERNAME below is "admin", not the svc-lcl-*-api code defaults in global_conf.py —
    # confirmed live (2026-07-14) that those defaults are placeholders with no matching account
    # on any real devtool instance (401 on every direct REST call using them); "admin" +
    # /devtools/admin/password (the shared initial admin password documented in the top-level
    # devops-tashtiot CLAUDE.md, see the vault: block below) is what actually works against
    # bitbucket/jira/confluence/sonarqube. This was a pre-existing bug, unrelated to the
    # tashtiot-apis-library bump or inbound-auth work also done this session — devops-api's
    # direct project/space/group-creation routes for these four tools were silently broken in
    # this live deployment before this fix (the Git-token-based ArgoCD GitOps flow uses a
    # different auth mechanism entirely and was unaffected).
    BITBUCKET_USERNAME: "admin"

    CONFLUENCE_API_URL: "https://confluence.devopstashtiot.page"
    CONFLUENCE_S3_PLUGINS_BASE_URL: "http://minio.minio.svc.cluster.local:9000/platform-clients/confluence-plugins"
    CONFLUENCE_S3_IMPORTS_BASE_URL: "http://minio.minio.svc.cluster.local:9000/platform-clients/confluence-space-imports"
    CONFLUENCE_USERNAME: "admin"

    JIRA_API_URL: "https://jira.devopstashtiot.page"
    JIRA_USERNAME: "admin"

    SONARQUBE_API_URL: "https://sonarqube.devopstashtiot.page"
    SONARQUBE_USERNAME: "admin"

    ARGOCD_ALLOWED_ENVS: '["prod","dr","int"]'
    ARGOCD_CLUSTER_SECRET_REPO_URL: "https://bitbucket.devopstashtiot.page/scm/argo/argocd.git"

    GIT_API_URL: "https://bitbucket.devopstashtiot.page/rest/api/1.0"
    GIT_PROJECT_KEY: "ARGO"
    GIT_SSH_KEY_PATH: "/root/.ssh/id_ed25519"

    DOMAIN_SUFFIX: "devopstashtiot.page"

    # Inbound auth (tashtiot-apis-library >= v1.0.0, general_create_app(enable_auth=True) in
    # app/main.py) — verifies every route's Bearer token via OIDC against this platform's own
    # Keycloak (rhbk), rather than a shared secret or a locally-generated keypair. No secret
    # value needed here (see the vault: block below for why) — OIDC/JWKS verification only
    # needs the issuer URL and the expected audience, both public. AUTH_AUDIENCE must match the
    # "devops-api-audience" client scope's audience mapper in clusters-provision/clusters/rhbk
    # (clientId "devops-api" there is the audience target, not a login client — see that repo's
    # values.yaml comment). Every caller now needs a real Bearer token — no caller of devops-api
    # was found documented anywhere in this platform when this was enabled (see
    # devops-api/CLAUDE.md's "Inbound auth" section for the full picture and how to generate a
    # test token).
    #
    # AUTH_OIDC_ISSUER matches argocd's (devtools/argocd/values.yaml) and sonarqube's
    # (devtools/sonarqube/values.yaml sonar.auth.oidc.issuerUri) existing config — confirmed
    # live by decoding a real Keycloak-issued token's `iss` claim, fetched through the actual
    # public hostname (https://rhbk.devopstashtiot.page, via ingress-nginx with proper
    # X-Forwarded-Proto handling): it comes back as this exact https URL, matching what's
    # configured here. (A test that queried Keycloak's ClusterIP directly, bypassing the
    # ingress and its forwarded-proto header, got back "http://rhbk...:8080" instead — that's
    # an artifact of skipping the proxy, not what any real caller — including devops-api's own
    # OIDC discovery call — actually receives. Don't "fix" this to the http://...:8080 form.)
    AUTH_ENABLED: "true"
    AUTH_OIDC_ISSUER: "https://rhbk.devopstashtiot.page/realms/devtools"
    AUTH_AUDIENCE: "devops-api"

  # GIT_TOKEN was previously a plaintext empty string here ("set out-of-band, not
  # committed to git") — the Git connector's Bearer-auth path sent it verbatim as
  # `Authorization: Bearer ` (empty), which httpx rejects as an illegal header value.
  # Sourced from SSM now instead, matching the platform's SSM SecureString + ExternalSecret
  # convention (see devtools-provision/CLAUDE.md).
  #
  # BITBUCKET_PASSWORD/JIRA_PASSWORD/CONFLUENCE_PASSWORD/SONARQUBE_PASSWORD all pull the same
  # shared admin password every devtool on this platform uses (devtools-labs' terraform/modules/
  # devtools-secrets publishes it) — paired with USERNAME: "admin" above, not a distinct
  # per-tool secret, matching how this one password already gates every devtool's own admin
  # login platform-wide.
  vault:
    enabled: true
    clusterSecretStore: aws-parameter-store
    secrets:
      - secretKey: GIT_TOKEN
        remoteRef:
          key: /devtools/bitbucket/api-token
      - secretKey: BITBUCKET_PASSWORD
        remoteRef:
          key: /devtools/admin/password
      - secretKey: JIRA_PASSWORD
        remoteRef:
          key: /devtools/admin/password
      - secretKey: CONFLUENCE_PASSWORD
        remoteRef:
          key: /devtools/admin/password
      - secretKey: SONARQUBE_PASSWORD
        remoteRef:
          key: /devtools/admin/password
      # Mounted as a file below (extraSecretMounts), not consumed as an env var — GIT_SSH_KEY_PATH
      # points at it. It does also land in the devops-api-secrets Secret's other keys via
      # envFrom (same Secret, no way to exclude one key from that without a second ExternalSecret)
      # — a minor exposure accepted here rather than adding a whole separate Secret/ExternalSecret
      # just to avoid it, consistent with this lab platform's existing secret-handling posture.
      - secretKey: GIT_SSH_PRIVATE_KEY
        remoteRef:
          key: /devtools/bitbucket/git-ssh-private-key

  # File-mounted SSH private key for the Git connector's delete_file path (git clone over SSH —
  # the only op that doesn't use the Bearer-token HTTP path add_file/modify_file use). Needed a
  # chart fix first (devtools-provision's deployment.yaml gated extraSecretMounts behind
  # "not vault.enabled", which devops-api always has enabled) — see that repo's git history.
  # Public half registered against Bitbucket's "admin" account (POST /rest/ssh/1.0/keys, matches
  # the "admin" REST credentials this deployment already uses — see BITBUCKET_USERNAME above).
  extraSecretMounts:
    - name: git-ssh-key
      secretName: devops-api-secrets
      defaultMode: 0400
      mountPath: /root/.ssh/id_ed25519
      subPath: GIT_SSH_PRIVATE_KEY
      readOnly: true
