# Overrides for the devops-api umbrella chart.
# Merged on top of devtools-provision/devtools/devops-api/values.yaml by ArgoCD.
#
# image.repository/tag reference GitHub Releases published from
# https://github.com/devops-tashtiot/devops-api — bump image.tag here to
# roll out a new release.

example-fast-api:
  image:
    repository: ghcr.io/devops-tashtiot/devops-api
    tag: "v0.2.6"
    pullPolicy: IfNotPresent

  # Per-environment values for the minikube-on-EC2 cluster — placeholders in
  # devtools-provision/devtools/devops-api/values.yaml, filled in here.
  #
  # *_API_URL values below point at each tool's in-cluster Service DNS
  # (<service>.<namespace>.svc.cluster.local), not its public
  # *.devopstashtiot.page hostname. devops-api runs as a pod in this same
  # cluster (see devtools-provision/devtools/devops-api), so routing its
  # calls out through the public hostname would bounce them through the
  # Cloudflare Tunnel and hit Cloudflare Access's interactive email-verify
  # page — Access is enforced at Cloudflare's edge before the tunnel ever
  # reaches this cluster's ingress, so there is no ingress-side header
  # (e.g. a CF-Access-Client-Id/Secret service token) that can satisfy it
  # after the fact. Calling the Service DNS directly stays on the pod
  # network and never touches the tunnel or Access at all. Service names/
  # ports below come from each chart's fullname helper + default
  # service port (see devtools-provision/devtools/<tool>/charts/<tool>):
  # bitbucket/confluence/jira use Bitnami's common.names.fullname, which
  # collapses to the bare release name (= namespace name) since the
  # release name already contains the chart name; sonarqube's own fullname
  # helper always emits "<release>-<chart>" (no such collapse), giving
  # "sonarqube-sonarqube"; artifactory collapses like bitbucket/confluence/jira.
  env:
    # Point at the in-cluster MinIO devtool (clusters-provision/clusters/minio)
    # instead of localhost (local dev) or real AWS S3 — its
    # "platform-clients"/"platform-devops-team" buckets are anonymous
    # public-read/write (mc anonymous set public), so devops-api's existing
    # httpx-based fetch/upload code works unchanged, just against
    # minio.minio.svc.cluster.local instead of localhost:9100.
    ARTIFACTORY_API_URL: "http://artifactory.artifactory.svc.cluster.local:8082"
    ARTIFACTORY_LDAP_SETTING_NAME: "ldap-ad"
    ARTIFACTORY_S3_XRAY_UPDATES_BASE_URL: "http://minio.minio.svc.cluster.local:9000/platform-devops-team/xray-vulnerability-updates"

    BITBUCKET_API_URL: "http://bitbucket.bitbucket.svc.cluster.local"

    CONFLUENCE_API_URL: "http://confluence.confluence.svc.cluster.local"
    CONFLUENCE_S3_PLUGINS_BASE_URL: "http://minio.minio.svc.cluster.local:9000/platform-clients/confluence-plugins"
    CONFLUENCE_S3_IMPORTS_BASE_URL: "http://minio.minio.svc.cluster.local:9000/platform-clients/confluence-space-imports"

    JIRA_API_URL: "http://jira.jira.svc.cluster.local"

    SONARQUBE_API_URL: "http://sonarqube-sonarqube.sonarqube.svc.cluster.local:9000"

    ARGOCD_ALLOWED_ENVS: '["prod","dr","int"]'
    ARGOCD_CLUSTER_SECRET_REPO_URL: "http://gitea-http.gitea.svc.cluster.local:3000/netanelzucaim/devtools-provision.git"

    GIT_API_URL: "http://bitbucket.bitbucket.svc.cluster.local/rest/api/1.0"
    GIT_TOKEN: "" # set out-of-band, not committed to git
    GIT_PROJECT_KEY: "ARGO"
    GIT_SSH_KEY_PATH: "/root/.ssh/id_ed25519"
    GIT_SSH_PORT: "7999"

    DOMAIN_SUFFIX: "devopstashtiot.page"
