# Overrides for Jira Data Center 9.12.8 running on the minikube-on-EC2 cluster.
# Cloudflare tunnel: jira.devopstashtiot.page → nginx-ingress → jira
#
# NOTE: Jira's Docker image/Helm chart has no automated setup mechanism for the
# license or the sysadmin user (unlike bitbucket) — the first-run setup wizard
# (entering the license, creating the first admin account) must be completed
# once in the browser after initial deploy. Read the license from SSM
# (/devtools/jira/license) and the shared admin password (/devtools/admin/password)
# directly with `aws ssm get-parameter --with-decryption` when doing that —
# there's no jira-license/jira-sysadmin Secret in-cluster since nothing would
# ever consume it.

jira:
  # Base chart defaults (1536m/1536m heap, 2.5Gi container limit) leave no
  # headroom once Jira is actually indexing/handling real projects alongside
  # Confluence and Bitbucket on the same node. Bumped heap and container
  # ceiling; requests kept modest (node is a single t3.2xlarge, 7 vCPU / 28Gi
  # allocatable — see devtools-labs/terraform/live/devtools/minikube
  # /terragrunt.hcl) so Confluence + Bitbucket + Jira requests don't eat the
  # whole node and starve ArgoCD/ingress-nginx/Artifactory/SonarQube.
  # ingress.https stays false (TLS terminates at Cloudflare, not in-cluster —
  # see devtools-provision/CLAUDE.md), so the chart's own
  # `{{ if .Values.ingress.https }} ATL_TOMCAT_SCHEME/ATL_TOMCAT_SECURE
  # {{ end }}` block in templates/statefulset.yaml never fires, and
  # ATL_PROXY_PORT (set unconditionally once ingress.host is set) resolves to
  # 80 via the jira.ingressPort helper (`default (ternary "443" "80"
  # .Values.ingress.https) .Values.ingress.port`). Jira then computes every
  # request as plain http://jira.devopstashtiot.page:80 while the browser is
  # actually on https://.../443 via Cloudflare. That scheme/port mismatch is
  # what Jira's Base URL vs. request-URL comparison trips on, producing "XSRF
  # check failed" on POSTs (e.g. create project) and silently breaking the
  # admin cog's AJAX-built nav (blocked as mixed content).
  #
  # Override ingress.port directly so the existing ATL_PROXY_PORT env var
  # (already emitted by the chart) resolves to 443 — don't also add
  # ATL_PROXY_PORT under jira.jira.additionalEnvironmentVariables, that
  # produces a duplicate env key and breaks ArgoCD's structured merge diff
  # entirely (confirmed: "duplicate entries for key [name=\"ATL_PROXY_PORT\"]").
  ingress:
    port: "443"

  jira:
    additionalEnvironmentVariables:
      - name: ATL_TOMCAT_SCHEME
        value: "https"
      - name: ATL_TOMCAT_SECURE
        value: "true"
    resources:
      jvm:
        maxHeap: "2048m"
        minHeap: "2048m"
        reservedCodeCache: "256m"
      container:
        requests:
          cpu: "1500m"
          memory: "3Gi"
        limits:
          cpu: "4"
          memory: "4Gi"

  database:
    url: "jdbc:postgresql://devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com:5432/jira"
  # Ensures the "jira" database/role exist on the shared RDS instance before
  # Jira starts — idempotent, safe to re-run on every pod start.
  additionalInitContainers:
    - name: ensure-postgres-db
      image: postgres:17-alpine
      env:
        - name: PGHOST
          value: "devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com"
        - name: PGPORT
          value: "5432"
        - name: ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: password
        - name: APP_DB_NAME
          value: "jira"
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          # Every devtool connects as the shared RDS admin user (see
          # rds-admin-credentials / jira-db, both sourced from the same SSM
          # params) — no per-tool role, so nothing to CREATE ROLE or GRANT
          # here, just make sure the database itself exists.
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM pg_database WHERE datname = '$APP_DB_NAME'" | grep -q 1 || \
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
            "CREATE DATABASE \"$APP_DB_NAME\" OWNER \"$ADMIN_USER\";"
  volumes:
    localHome:
      persistentVolumeClaim:
        storageClassName: standard
    sharedHome:
      persistentVolumeClaim:
        storageClassName: standard

wrapper:
  rdsAdmin:
    usernameSsmParameter: "/devtools/rds/admin-username"
    passwordSsmParameter: "/devtools/rds/admin-password"
