# Overrides for SonarQube Community Edition 25.6.0.109173 running on the
# minikube-on-EC2 cluster.
# Cloudflare tunnel: sonarqube.devopstashtiot.page → nginx-ingress → sonarqube
#
# Community Edition is free and requires no license key at all (unlike
# Developer/Enterprise/Data Center editions) — there's nothing to wire from
# SSM here beyond the shared admin password and RDS credentials.

sonarqube:
  jdbcOverwrite:
    jdbcUrl: "jdbc:postgresql://devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com:5432/sonarqube"
    # Plaintext is fine here (matches this repo's convention of committing DB
    # credentials in plaintext) — the chart's jdbcOverwrite has no
    # secret-backed username field, only a secret-backed password.
    jdbcUsername: "devtools"

  # Ensures the "sonarqube" database exists on the shared RDS instance before
  # SonarQube starts — idempotent, safe to re-run on every pod start. Same
  # pattern as devtools-definition/devtools/{bitbucket,confluence}, adapted
  # to this chart's own extraInitContainers field.
  extraInitContainers:
    - name: ensure-postgres-db
      image: postgres:17-alpine
      env:
        - name: PGHOST
          value: "devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com"
        - name: PGPORT
          value: "5432"
        - name: ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: password
        - name: APP_DB_NAME
          value: "sonarqube"
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          # Every devtool connects as the shared RDS admin user (see
          # rds-admin-credentials / sonarqube-db, both sourced from the same
          # SSM params) — no per-tool role, so nothing to CREATE ROLE or
          # GRANT here, just make sure the database itself exists.
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM pg_database WHERE datname = '$APP_DB_NAME'" | grep -q 1 || \
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
            "CREATE DATABASE \"$APP_DB_NAME\" OWNER \"$ADMIN_USER\";"

  persistence:
    storageClass: standard

  # Chart requirement, not a credential to an external system — gates the
  # /api/system endpoints the readiness/liveness probes call. Plaintext is
  # fine per this repo's convention.
  monitoringPasscode: "fa01e8bfa359d47924497131c1863fd7"

  # sonar-auth-oidc (installed via plugins.install in devtools-provision)
  # settings — see clusters-provision/clusters/rhbk/templates/realm-import.yaml
  # for the "sonarqube" client this issuer/clientId point at. clientSecret is
  # loaded from the sonarqube-oidc-secret-properties Secret (templates/oidc-secret.yaml)
  # instead of going here in plaintext.
  sonarProperties:
    # Required by sonar-auth-oidc for it to build the redirect_uri it sends
    # to Keycloak (https://github.com/sonar-auth-oidc/sonar-auth-oidc: "no
    # trailing slash allowed"). Without this, SonarQube auto-detects its base
    # URL from the incoming request — but TLS terminates at Cloudflare, not
    # at the pod (ingress.annotations sets ssl-redirect: false), so the
    # auto-detected URL doesn't match the sole redirect URI registered on the
    # "sonarqube" Keycloak client (clusters-definition/clusters/rhbk/values.yaml:
    # "https://sonarqube.devopstashtiot.page/oauth2/callback/oidc"), and
    # Keycloak rejects the login with "Invalid parameter: redirect_uri".
    sonar.core.serverBaseURL: "https://sonarqube.devopstashtiot.page"
    sonar.auth.oidc.enabled: true
    sonar.auth.oidc.issuerUri: "https://rhbk.devopstashtiot.page/realms/devtools"
    sonar.auth.oidc.clientId.secured: "sonarqube"
    # "groups" must be explicitly requested — it's an optional (not default)
    # client scope on the Keycloak side, see realm-import.yaml.
    sonar.auth.oidc.scopes: "openid email profile groups"
    sonar.auth.oidc.loginButtonText: "RHBK"
    sonar.auth.oidc.groupsSync: true
    sonar.auth.oidc.groupsSync.claimName: "groups"
  sonarSecretProperties: "sonarqube-oidc-secret-properties"

# Shared admin password across argocd/bitbucket/confluence/sonarqube.
adminPasswordSsmParameter: "/devtools/admin/password"

rdsAdmin:
  usernameSsmParameter: "/devtools/rds/admin-username"
  passwordSsmParameter: "/devtools/rds/admin-password"

# Same SSM parameter clusters-provision/clusters/rhbk's
# set-sonarqube-client-secret-job.yaml reads to set the real value on the
# RHBK/Keycloak side — one source of truth, no manual sync needed.
oidcClientSecretSsmParameter: "/devtools/rhbk/sonarqube-client-secret"

# Grants admin to anyone in the devops-tashtiot AD group (see
# clusters-provision/clusters/rhbk's group-ldap-mapper) rather than
# individual users — matches the same pattern used for ArgoCD's RBAC.
adminGroup:
  name: "devops-tashtiot"
