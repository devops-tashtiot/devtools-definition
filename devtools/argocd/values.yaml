# Overrides for the ArgoCD umbrella chart.
# Merged on top of devtools-provision/devtools/argocd/values.yaml by ArgoCD.
# TLS is terminated at Cloudflare — ArgoCD runs insecure behind nginx-ingress + cloudflared.
#
# NOTE: `ingress.enabled: true` below is only correct while the minikube module
# is the active environment (its ingress-nginx/cloudflared devtools are
# GitOps-managed). If EKS is ever active at the same time, its argocd-ingress
# Terraform module creates the same "argocd" Ingress object directly — do not
# run both against this repo simultaneously, or set `enabled: false` here
# before switching to EKS.

argo-cd:
  crds:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true

  configs:
    params:
      "server.insecure": true
    # argocd-tls-certs-cm is created and owned by devtools-provision/devtools/argocd/templates/
    # trusted-certs.yaml (an ExternalSecret using its spec.target.manifest field, sourced from
    # SSM) instead — disable the chart's own management of it to avoid two controllers fighting
    # over the same object. See that template's comment for the full "why".
    tls:
      create: false
    cm:
      # Required for OIDC to work at all: without it, ArgoCD has to guess its
      # own external base URL to build the redirect_uri it sends to RHBK's
      # authorization endpoint, and that guess doesn't match the exact
      # redirect URI registered for the "argocd" client (argocdClient.redirectUri
      # in clusters-definition/clusters/rhbk/values.yaml) — Keycloak then
      # rejects the login with "Invalid redirect URL: the protocol and host
      # (including port) must match".
      url: https://argocd.devopstashtiot.page
      "accounts.admin": "apiKey, login"
      # OIDC login backed by RHBK/AD — see clusters-definition/clusters/rhbk
      # for the realm + client this issuer/clientID point at. clientSecret
      # is substituted from argocd-secret's oidc.keycloak.clientSecret key,
      # merged in via devtools-provision/devtools/argocd/templates/oidc-secret.yaml.
      #
      # rootCA: outbound calls argocd-server itself makes to rhbk.devopstashtiot.page
      # (OIDC discovery + token verification, for both browser login here and
      # devops-api's client_credentials service account — see
      # app/v1/argocd/CLAUDE.md in devops-api) resolve in-cluster to
      # ingress-nginx, which presents the real Cloudflare Origin Certificate —
      # not a publicly-trusted CA. Without this, every OIDC token gets
      # rejected with "x509: certificate signed by unknown authority",
      # regardless of who it was issued to. This is ArgoCD's own built-in
      # field for a self-signed/internal-CA IdP (see the vendored chart's
      # commented example at charts/argo-cd/values.yaml's oidc.config
      # section) — no volume mount or initContainer needed, since it's a
      # public certificate, safe to inline as plain text here. Same PEM
      # ingress-nginx's own TLS cert uses (clusters-provision/clusters/
      # ingress-nginx/templates/origin-cert-secret.yaml, sourced from SSM
      # /devtools/cloudflare/origin-cert-crt) — re-paste from there if it's
      # ever rotated.
      "oidc.config": |
        name: RHBK
        issuer: https://rhbk.devopstashtiot.page/realms/devtools
        clientID: argocd
        clientSecret: $argocd-secret:oidc.keycloak.clientSecret
        requestedScopes:
          - openid
          - profile
          - email
          - groups
        rootCA: |
          -----BEGIN CERTIFICATE-----
          MIIEsjCCA5qgAwIBAgIUEtR0JDa8YmE1A105oCc0XgLBL/gwDQYJKoZIhvcNAQEL
          BQAwgYsxCzAJBgNVBAYTAlVTMRkwFwYDVQQKExBDbG91ZEZsYXJlLCBJbmMuMTQw
          MgYDVQQLEytDbG91ZEZsYXJlIE9yaWdpbiBTU0wgQ2VydGlmaWNhdGUgQXV0aG9y
          aXR5MRYwFAYDVQQHEw1TYW4gRnJhbmNpc2NvMRMwEQYDVQQIEwpDYWxpZm9ybmlh
          MB4XDTI2MDcxMzIzMzUwMFoXDTQxMDcwOTIzMzUwMFowYjEZMBcGA1UEChMQQ2xv
          dWRGbGFyZSwgSW5jLjEdMBsGA1UECxMUQ2xvdWRGbGFyZSBPcmlnaW4gQ0ExJjAk
          BgNVBAMTHUNsb3VkRmxhcmUgT3JpZ2luIENlcnRpZmljYXRlMIIBIjANBgkqhkiG
          9w0BAQEFAAOCAQ8AMIIBCgKCAQEAw8P+LiyK5GS9v21xr8dnCVpF0VNYBfWP3eM2
          D2KQAj3yrQVB/6HUgWNK4u0Da7VevWoMseAY3snM3GY5DCBpmAAAXkz/LdOmJevt
          b7Zxi2xk8Xdp5i2EdHC4gDV5mM8G5ateMtdZiw/+VVXOJtwI8F6wFGEZ9znVck3P
          ALDHN65ObVOlMhTIENhaxRd4vDCP0kgZGlVQzB8G4V9cfEohB0HQ1T1wV4zKuZEH
          GeXCi2c+Yey9/b4mzHtkhzCvQwKLSnGxhMXtufUeAWfE/SLbTxnfhBt4z7H8ZW0o
          GBRokliFS2dAi7N2F9K45C6gHdmRfh0ky/pAP6psIC8nWuUoPwIDAQABo4IBNDCC
          ATAwDgYDVR0PAQH/BAQDAgWgMB0GA1UdJQQWMBQGCCsGAQUFBwMCBggrBgEFBQcD
          ATAMBgNVHRMBAf8EAjAAMB0GA1UdDgQWBBSVH1ihjGJCaNRdGSJDIhX8OUZe6DAf
          BgNVHSMEGDAWgBQk6FNXXXw0QIep65TbuuEWePwppDBABggrBgEFBQcBAQQ0MDIw
          MAYIKwYBBQUHMAGGJGh0dHA6Ly9vY3NwLmNsb3VkZmxhcmUuY29tL29yaWdpbl9j
          YTA1BgNVHREELjAsghUqLmRldm9wc3Rhc2h0aW90LnBhZ2WCE2Rldm9wc3Rhc2h0
          aW90LnBhZ2UwOAYDVR0fBDEwLzAtoCugKYYnaHR0cDovL2NybC5jbG91ZGZsYXJl
          LmNvbS9vcmlnaW5fY2EuY3JsMA0GCSqGSIb3DQEBCwUAA4IBAQABOMP1/GSmDr92
          FASRuh6pphemz2y2G6iBTdN13E9OKGYoZwc52EigScHucFdm6g5m6vQ8EjOi4ZzF
