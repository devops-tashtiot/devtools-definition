# EKS-specific overrides for the ArgoCD umbrella chart.
# Merged on top of devtools-provisions/charts/argocd/values.yaml by ArgoCD.

argo-cd:
  configs:
    repositories:
      devtools-provisions:
        url: https://github.com/devops-tashtiot/devtools-provisions
        type: git
        name: devtools-provisions
      devtools-definition:
        url: https://github.com/devops-tashtiot/devtools-definition
        type: git
        name: devtools-definition

  server:
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  repoServer:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  controller:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
