# EKS-specific overrides for the ArgoCD umbrella chart.
# Merged on top of devtools-provisions/devtools/argocd/values.yaml by ArgoCD.
# TLS is terminated at Cloudflare — ArgoCD runs insecure behind nginx-ingress + cloudflared.

argo-cd:
  configs:
    params:
      "server.insecure": true
    cm:
      "accounts.admin": "apiKey, login"
    repositories:
      devtools-provisions:
        url: https://github.com/devops-tashtiot/devtools-provisions
        type: git
        name: devtools-provisions
      devtools-definition:
        url: https://github.com/devops-tashtiot/devtools-definition
        type: git
        name: devtools-definition

  server:
    service:
      type: ClusterIP
    extraArgs:
      - --insecure
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  repoServer:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  controller:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
