# Overrides for the ArgoCD umbrella chart.
# Merged on top of devtools-provision/devtools/argocd/values.yaml by ArgoCD.
# TLS is terminated at Cloudflare — ArgoCD runs insecure behind nginx-ingress + cloudflared.
#
# NOTE: `ingress.enabled: true` below is only correct while the minikube module
# is the active environment (its ingress-nginx/cloudflared devtools are
# GitOps-managed). If EKS is ever active at the same time, its argocd-ingress
# Terraform module creates the same "argocd" Ingress object directly — do not
# run both against this repo simultaneously, or set `enabled: false` here
# before switching to EKS.

argo-cd:
  crds:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true

  configs:
    params:
      "server.insecure": true
    cm:
      # Required for OIDC to work at all: without it, ArgoCD has to guess its
      # own external base URL to build the redirect_uri it sends to RHBK's
      # authorization endpoint, and that guess doesn't match the exact
      # redirect URI registered for the "argocd" client (argocdClient.redirectUri
      # in clusters-definition/clusters/rhbk/values.yaml) — Keycloak then
      # rejects the login with "Invalid redirect URL: the protocol and host
      # (including port) must match".
      url: https://argocd.devopstashtiot.page
      "accounts.admin": "apiKey, login"
      # OIDC login backed by RHBK/AD — see clusters-definition/clusters/rhbk
      # for the realm + client this issuer/clientID point at. clientSecret
      # is substituted from argocd-secret's oidc.keycloak.clientSecret key,
      # merged in via devtools-provision/devtools/argocd/templates/oidc-secret.yaml.
      "oidc.config": |
        name: RHBK
        issuer: https://rhbk.devopstashtiot.page/realms/devtools
        clientID: argocd
        clientSecret: $argocd-secret:oidc.keycloak.clientSecret
        requestedScopes:
          - openid
          - profile
          - email
          - groups
    rbac:
      # Grants admin to anyone in the devops-tashtiot AD group (surfaced as a
      # "groups" claim by RHBK's optional "groups" client scope — see
      # clusters-provision/clusters/rhbk/templates/realm-import.yaml and
      # set-ldap-credentials-job.yaml's group-ldap-mapper) rather than
      # individual users, so AD group membership is the single source of
      # truth for who administers ArgoCD.
      "policy.csv": |
        g, devops-tashtiot, role:admin
    repositories:
      devtools-provision:
        url: https://github.com/devops-tashtiot/devtools-provision
        type: git
        name: devtools-provision
      devtools-definition:
        url: https://github.com/devops-tashtiot/devtools-definition
        type: git
        name: devtools-definition
      clusters-provision:
        url: https://github.com/devops-tashtiot/clusters-provision
        type: git
        name: clusters-provision
      clusters-definition:
        url: https://github.com/devops-tashtiot/clusters-definition
        type: git
        name: clusters-definition

  server:
    service:
      type: ClusterIP
    extraArgs:
      - --insecure
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  repoServer:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  controller:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

wrapper:
  ingress:
    enabled: true
    host: argocd.devopstashtiot.page

  # Shared admin password across argocd/bitbucket/confluence — see
  # devtools-provision/devtools/argocd/templates/argocd-admin-secret.yaml
  adminPasswordSsmParameter: "/devtools/admin/password"

  # RHBK-issued OIDC client secret for ArgoCD — see
  # devtools-provision/devtools/argocd/templates/oidc-secret.yaml. This is the
  # same shared SSM parameter (one value for argocd/sonarqube/jira/confluence/
  # bitbucket — see clusters-provision/clusters/rhbk/values.yaml's
  # sharedClientSecretSsmParameter) clusters-provision/clusters/rhbk's
  # set-client-secrets-job.yaml reads to set the actual secret on every client
  # on the RHBK side via the Admin API — one source of truth, no manual sync
  # needed.
  oidcClientSecretSsmParameter: "/devtools/rhbk/oidc-client-secret"
