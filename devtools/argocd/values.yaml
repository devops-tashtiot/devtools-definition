# EKS-specific overrides for the ArgoCD umbrella chart.
# These are merged on top of devtools-provisions/charts/argocd/values.yaml by ArgoCD.

argo-cd:
  global:
    domain: argocd.devtools-labs.example.com

  configs:
    cm:
      accounts.admin: "apiKey, login"
    repositories:
      devtools-provisions:
        url: https://github.com/devops-tashtiot/devtools-provisions
        type: git
        name: devtools-provisions
      devtools-definition:
        url: https://github.com/devops-tashtiot/devtools-definition
        type: git
        name: devtools-definition

  server:
    service:
      # Use LoadBalancer to get an AWS NLB for external access,
      # or keep ClusterIP and use: kubectl port-forward svc/argocd-server -n argocd 8080:80
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  repoServer:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  controller:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
