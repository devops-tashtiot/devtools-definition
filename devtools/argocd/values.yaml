          9xfabX1wvQ43L3n8NRN5o++tBn8cNmsJIjiebpmxjNXvnsDauso2p73yJiYKVz6z
          Asvk9ko+tt/KsV6hrg+YVrRdklK5W1afb/P2uyZ+UYHQvDZwDjeTybI4LvjecHBG
          btEk3zJSUI02Vfg9E5l61ehoJZNNIEhD+kuUeXqM1NKzt3xuVLqQEyKz+wk9tHol
          XnlahjtZ
          -----END CERTIFICATE-----
    rbac:
      # Grants admin to anyone in the devops-tashtiot AD group (surfaced as a
      # "groups" claim by RHBK's optional "groups" client scope — see
      # clusters-provision/clusters/rhbk/templates/realm-import.yaml and
      # set-ldap-credentials-job.yaml's group-ldap-mapper) rather than
      # individual users, so AD group membership is the single source of
      # truth for who administers ArgoCD.
      #
      # The devops-api-argocd-svc role/group below is devops-api's own outbound service
      # identity (clusters-provision/clusters/rhbk's argocdServiceClient — a dedicated
      # client_credentials client, not a real AD login) for its cluster-secret routes
      # (app/v1/argocd/operations.py's create_cluster_secret/edit_cluster_secret/
      # delete_cluster_secret, all of which operate on Applications in the "default" ArgoCD
      # project only — see ARGOCD_CLUSTER_SECRET_CHART_PATH/that hardcoded "project": "default"
      # in operations.py). Deliberately scoped to just the actions that module calls, not
      # role:admin — a service account should get the least privilege its code actually needs.
      "policy.csv": |
        g, devops-tashtiot, role:admin
        p, role:devops-api-argocd-svc, applications, get, default/*, allow
        p, role:devops-api-argocd-svc, applications, create, default/*, allow
        p, role:devops-api-argocd-svc, applications, update, default/*, allow
        p, role:devops-api-argocd-svc, applications, delete, default/*, allow
        p, role:devops-api-argocd-svc, applications, sync, default/*, allow
        g, devops-api-argocd-svc, role:devops-api-argocd-svc
    repositories:
      devtools-provision:
        url: https://github.com/devops-tashtiot/devtools-provision
        type: git
        name: devtools-provision
      devtools-definition:
        url: https://github.com/devops-tashtiot/devtools-definition
        type: git
        name: devtools-definition
      clusters-provision:
        url: https://github.com/devops-tashtiot/clusters-provision
        type: git
        name: clusters-provision
      clusters-definition:
        url: https://github.com/devops-tashtiot/clusters-definition
        type: git
        name: clusters-definition

  server:
    service:
      type: ClusterIP
    extraArgs:
      - --insecure
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # kube-prometheus-stack is deployed and its monitoring.coreos.com CRDs
    # exist on this cluster now — safe to enable the ServiceMonitor Prometheus
    # Operator picks up automatically. Its Prometheus CR's serviceMonitorSelector
    # is matchLabels: {release: kube-prometheus-stack} (serviceMonitorSelectorNilUsesHelmValues,
    # not the {} match-all shown as an example in the chart's own values.yaml
    # comments — confirmed against the live Prometheus CR), so additionalLabels
    # below is required or these ServiceMonitors are silently never scraped.
    # Feeds dashboards/argocd.json (see devtools-provision/devtools/argocd).
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack

  repoServer:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack

  controller:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack

wrapper:
  ingress:
    enabled: true
    # *.argocd.devopstashtiot.page added 2026-07-21 — routes the per-consumer ArgoCD wildcard
    # (app/v1/argocd/CLAUDE.md in devops-api, _build_argocd()) through ingress-nginx with real
    # TLS (now covered by the Origin Cert's added SAN — see devtools-labs/terraform/live/
    # devtools/cloudflare) instead of connecting directly to argocd-server's plain-HTTP Service.
    hosts:
      - argocd.devopstashtiot.page
      - "*.argocd.devopstashtiot.page"

  # Same SSM value bitbucket/jira/confluence/artifactory's trusted-certs.yaml already use —
  # see devtools-provision/devtools/argocd/templates/trusted-certs.yaml for how this feeds
  # argocd-tls-certs-cm (repo-server's git-over-HTTPS trust store) instead of a JVM truststore.
  trustedCertsSsmParameter: "/devtools/cloudflare/origin-ca-root-cert"

  # Shared admin password across argocd/bitbucket/confluence — see
  # devtools-provision/devtools/argocd/templates/argocd-admin-secret.yaml
  adminPasswordSsmParameter: "/devtools/admin/password"

  # RHBK-issued OIDC client secret for ArgoCD — see
  # devtools-provision/devtools/argocd/templates/oidc-secret.yaml. This is the
  # same shared SSM parameter (one value for argocd/sonarqube/jira/confluence/
  # bitbucket — see clusters-provision/clusters/rhbk/values.yaml's
  # sharedClientSecretSsmParameter) clusters-provision/clusters/rhbk's
  # set-client-secrets-job.yaml reads to set the actual secret on every client
  # on the RHBK side via the Admin API — one source of truth, no manual sync
  # needed.
  oidcClientSecretSsmParameter: "/devtools/rhbk/oidc-client-secret"

  # kube-prometheus-stack is deployed with grafana.sidecar.dashboards.enabled
  # + searchNamespace: ALL (see clusters-definition/clusters/kube-prometheus-stack)
  # — safe to turn this on now (see devtools-provision/devtools/argocd/values.yaml
  # for what this renders).
  grafanaDashboard:
    enabled: true
