# Overrides for Confluence Data Center 9.3.1 running on the minikube-on-EC2 cluster.
# Cloudflare tunnel: confluence.devopstashtiot.page → nginx-ingress → confluence

confluence:
  # This chart overloads ingress.https for two things: the K8s Ingress TLS
  # stanza (unused here — ssl-redirect is off, Cloudflare terminates TLS) AND
  # the ATL_PROXY_NAME/ATL_PROXY_PORT env vars that tell Confluence's Tomcat
  # it's reached over HTTPS at the edge. Leaving it false (the devtools-provision
  # default) makes Confluence compute its own base URL as http://, which
  # mismatches the browser's https:// origin and requires manually clicking
  # "Update base URL" after every setup. Same issue already fixed the same way
  # for bitbucket (see devtools/bitbucket/values.yaml) — must be true here
  # even though TLS isn't terminated in-cluster.
  ingress:
    https: true

  # Base chart defaults (1536m heap / 2.5Gi container limit) are sized for a
  # local Kind cluster and leave no headroom once Confluence is actually doing
  # work (OSGi plugin/bundle loading, setup wizard rendering) — observed the
  # container pegged at ~99.9% of its 2.5Gi cgroup limit under real load,
  # killing Tomcat worker threads mid-response (seen as nginx "upstream
  # prematurely closed connection" / Cloudflare 502s). Bumped for this
  # environment, which has the headroom (node: 30Gi RAM, ~16-20Gi free).
  #
  # cpu.requests also drives this chart's auto-computed -XX:ActiveProcessorCount
  # (floor of container.requests.cpu, see charts/confluence/templates/config-jvm.yaml).
  # At 2000m -> ActiveProcessorCount=2, Confluence intermittently hit
  # "Spring Application context has not been set" during PluginFrameworkContextListener
  # startup (a race between the plugin framework listener and the async Spring root
  # context bootstrap) — failed on 4 of 5 observed boots. Raising to 3, then to 4
  # (matching the old 4-core limit) still failed 5/5 consecutive boots on 2026-07-07 —
  # confirmed via /sys/fs/cgroup/cpu.stat that the container was CFS-throttled
  # (nr_throttled>0, several seconds of throttled_usec) during boot, i.e. it was hitting
  # the *limit* ceiling, not lacking requested share. Raising ActiveProcessorCount alone
  # made the JVM spin up more concurrent threads against the same 4-core hard cap, which
  # made throttling worse. Node has 16 vCPUs total and sits well under 1.0 load average,
  # so headroom exists — raised limits.cpu to 8 to remove the throttling ceiling above
  # the ActiveProcessorCount=4 the JVM now plans concurrency around.
  confluence:
    # Confluence Data Center disables plugin upload via UPM by default for security
    # (confirmed live: POST /rest/plugins/1.0/?token=... 403s "Plugins cannot be installed
    # via upload" even with a valid token, regardless of caller). devops-api's plugin
    # install flow (app/v1/confluence/operations.py: install_plugin) depends on upload
    # being enabled — kept on permanently by deliberate choice, not just for one-off
    # verification. Atlassian's docs warn against leaving this on if you don't trust who
    # can reach the UPM upload endpoint; this instance restricts it to the shared
    # svc-devops-tashtiot service account via devops-api, which is the intended caller.
    additionalJvmArgs:
      - "-Dupm.plugin.upload.enabled=true"

    resources:
      jvm:
        maxHeap: "2048m"
        minHeap: "2048m"
        reservedCodeCache: "256m"
      container:
        requests:
          cpu: 4000m
          memory: 3Gi
        limits:
          cpu: 8
          memory: 4Gi

    # devtools-rds is a shared db.t3.micro (max_connections=81, 78 usable after the
    # rds_reserved superuser reserve). The other 5 devtools alone routinely hold ~70
    # connections (jira 20, sonarqube 20, artifactory 15, bitbucket 5, rhbk 2, misc 3),
    # leaving ~8 free. Confluence's own Hikari pool defaults (minimumIdle=20,
    # maximumPoolSize=100 per confluence.cfg.xml.j2) need far more headroom than that to
    # even open its pool on Spring context (re)init — this reliably threw
    # "PSQLException: FATAL: remaining connection slots are reserved for roles with
    # privileges of the rds_reserved role" -> cascading "Spring Application context has
    # not been set" on every boot and every setup-wizard DB-config submission on
    # 2026-07-07, regardless of CPU/cache/config-corruption fixes tried first. Shrinking
    # the pool via ATL_DB_POOLMINSIZE/POOLMAXSIZE (documented atlassian/confluence image
    # env vars, see confluence.cfg.xml.j2 in the image) is the actual fix — it's a
    # symptom of the shared instance being oversubscribed, not something CPU/cache tuning
    # could ever have solved. This must live under confluence.confluence (not
    # confluence.additionalEnvironmentVariables) — the vendor subchart double-nests all
    # container-level settings under its own "confluence:" key, same as .resources above.
    additionalEnvironmentVariables:
      - name: ATL_DB_POOLMINSIZE
        value: "5"
      - name: ATL_DB_POOLMAXSIZE
        value: "15"

  database:
    url: "jdbc:postgresql://devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com:5432/confluence"
  # Ensures the "confluence" database/role exist on the shared RDS instance
  # before Confluence starts — idempotent, safe to re-run on every pod start.
  # Replaces the old devtools-labs/terraform/live/devtools/rds-databases unit.
  additionalInitContainers:
    - name: ensure-postgres-db
      image: postgres:17-alpine
      env:
        - name: PGHOST
          value: "devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com"
        - name: PGPORT
          value: "5432"
        - name: ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: password
        - name: APP_DB_NAME
          value: "confluence"
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          # Every devtool connects as the shared RDS admin user (see
          # rds-admin-credentials / confluence-db, both sourced from the
          # same SSM params) — no per-tool role, so nothing to CREATE ROLE
          # or GRANT here, just make sure the database itself exists.
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM pg_database WHERE datname = '$APP_DB_NAME'" | grep -q 1 || \
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
            "CREATE DATABASE \"$APP_DB_NAME\" OWNER \"$ADMIN_USER\";"
  volumes:
    localHome:
      persistentVolumeClaim:
        storageClassName: standard
    sharedHome:
      persistentVolumeClaim:
        storageClassName: standard
    synchronyHome:
      persistentVolumeClaim:
        storageClassName: standard

wrapper:
  confluenceSecrets:
    # License is stored in AWS SSM Parameter Store (SecureString), not here —
    # requires the external-secrets-operator devtool + ClusterSecretStore.
    licenseSsmParameter: "/devtools/confluence/license"

  rdsAdmin:
    usernameSsmParameter: "/devtools/rds/admin-username"
    passwordSsmParameter: "/devtools/rds/admin-password"
