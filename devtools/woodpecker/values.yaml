# EKS-specific overrides for Woodpecker CI.
# Merged on top of devtools-provision/devtools/woodpecker/values.yaml by ArgoCD.
# Traffic: Cloudflare → cloudflared → nginx-ingress → woodpecker-server (ClusterIP).
# Prereq: add DNS CNAME woodpecker.devopstashtiot.page → 7de872ce-2826-42fb-9aea-325e10e3e5fc.cfargotunnel.com

woodpecker:
  server:
    env:
      WOODPECKER_HOST: "https://woodpecker.devopstashtiot.page"

    service:
      type: ClusterIP

    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "false"
      hosts:
        - host: woodpecker.devopstashtiot.page
          paths:
            - path: /
              pathType: Prefix

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  agent:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
