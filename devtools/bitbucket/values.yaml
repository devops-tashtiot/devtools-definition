# Overrides for Bitbucket Data Center 10.2.2 running on the minikube-on-EC2 cluster.
# Cloudflare tunnel: bitbucket.devopstashtiot.page → nginx-ingress → bitbucket

bitbucket:
  # This chart overloads ingress.https for two things: the K8s Ingress TLS
  # stanza (unused here — ssl-redirect is off, Cloudflare terminates TLS) AND
  # the SERVER_SCHEME/SERVER_SECURE/SERVER_PROXY_PORT/SETUP_BASEURL env vars
  # that tell Bitbucket it's reached over HTTPS at the edge. Leaving it false
  # (the devtools-provision default, matching every other tool's convention)
  # makes Bitbucket compute its own base URL as http://, which mismatches the
  # browser's https:// Origin/Referer and trips its XSRF filter, silently
  # blocking login POSTs. Must be true here even though TLS isn't terminated
  # in-cluster.
  ingress:
    https: true

  # Base chart defaults (768m/512m heap, 3Gi container limit) were fine for
  # initial setup but leave no headroom once real repos/PR builds are hitting
  # it alongside Confluence and Jira on the same node. Bumped heap and
  # container ceiling; requests kept modest (node is a single t3.2xlarge,
  # 7 vCPU / 28Gi allocatable — see devtools-labs/terraform/live/devtools/minikube
  # /terragrunt.hcl) so Confluence + Bitbucket + Jira requests don't eat the
  # whole node and starve ArgoCD/ingress-nginx/Artifactory/SonarQube.
  bitbucket:
    resources:
      jvm:
        maxHeap: "1536m"
        minHeap: "1024m"
      container:
        requests:
          cpu: "750m"
          memory: "4Gi"
        limits:
          cpu: "3"
          memory: "5Gi"
    # Public access is globally disabled by default since Bitbucket DC 8.18 — this is the
    # only way to enable it (no REST endpoint; confirmed by 404s on /admin/permissions/anonymous
    # and /admin/settings against a SYS_ADMIN token). -D<property>=<value> JVM args map
    # directly to bitbucket.properties keys in Atlassian DC apps.
    # https://confluence.atlassian.com/bitbucketserver/allowing-public-access-to-code
    additionalJvmArgs:
      - "-Dfeature.public.access=true"

  database:
    url: "jdbc:postgresql://devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com:5432/bitbucket"
  # Ensures the "bitbucket" database/role exist on the shared RDS instance
  # before Bitbucket starts — idempotent, safe to re-run on every pod start.
  # Replaces the old devtools-labs/terraform/live/devtools/rds-databases unit.
  additionalInitContainers:
    - name: ensure-postgres-db
      image: postgres:17-alpine
      env:
        - name: PGHOST
          value: "devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com"
        - name: PGPORT
          value: "5432"
        - name: ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: password
        - name: APP_DB_NAME
          value: "bitbucket"
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          # Every devtool connects as the shared RDS admin user (see
          # rds-admin-credentials / bitbucket-db, both sourced from the same
          # SSM params) — no per-tool role, so nothing to CREATE ROLE or
          # GRANT here, just make sure the database itself exists.
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM pg_database WHERE datname = '$APP_DB_NAME'" | grep -q 1 || \
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
            "CREATE DATABASE \"$APP_DB_NAME\" OWNER \"$ADMIN_USER\";"
  volumes:
    localHome:
      persistentVolumeClaim:
        storageClassName: gp3
    sharedHome:
      storageClassName: gp3

wrapper:
  bitbucketSecrets:
    # License is stored in AWS SSM Parameter Store (SecureString), not here —
    # requires the external-secrets-operator devtool + ClusterSecretStore.
    licenseSsmParameter: "/devtools/bitbucket/license"
    admin:
      username: admin
      displayName: "Admin"
      emailAddress: "netanelzucaim100@gmail.com"
    # Shared admin password across argocd/bitbucket/confluence.
    adminPasswordSsmParameter: "/devtools/admin/password"

  rdsAdmin:
    usernameSsmParameter: "/devtools/rds/admin-username"
    passwordSsmParameter: "/devtools/rds/admin-password"
