# Overrides for Bitbucket Data Center 10.2.2 running on the minikube-on-EC2 cluster.
# Cloudflare tunnel: bitbucket.devopstashtiot.page → nginx-ingress → bitbucket

bitbucket:
  database:
    url: "jdbc:postgresql://devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com:5432/bitbucket"
  # Ensures the "bitbucket" database/role exist on the shared RDS instance
  # before Bitbucket starts — idempotent, safe to re-run on every pod start.
  # Replaces the old devtools-labs/terraform/live/devtools/rds-databases unit.
  additionalInitContainers:
    - name: ensure-postgres-db
      image: postgres:17-alpine
      env:
        - name: PGHOST
          value: "devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com"
        - name: PGPORT
          value: "5432"
        - name: ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: rds-admin-credentials
              key: password
        - name: APP_DB_NAME
          value: "bitbucket"
        - name: APP_DB_USER
          valueFrom:
            secretKeyRef:
              name: bitbucket-db
              key: username
        - name: APP_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bitbucket-db
              key: password
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM pg_roles WHERE rolname = '$APP_DB_USER'" | grep -q 1 || \
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
            "CREATE ROLE \"$APP_DB_USER\" LOGIN PASSWORD '$APP_DB_PASSWORD';"
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
            "ALTER ROLE \"$APP_DB_USER\" WITH PASSWORD '$APP_DB_PASSWORD';"
          # Postgres 16+ on RDS doesn't implicitly grant the creating admin
          # user usable SET ROLE rights on a role it just created — without
          # this explicit GRANT, "CREATE DATABASE ... OWNER" below fails with
          # "must be able to SET ROLE". Not currently hit here since
          # Terraform pre-creates the "bitbucket" database, but keeping this
          # consistent with confluence/jira protects against a future
          # from-scratch RDS instance where it would matter.
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
            "GRANT \"$APP_DB_USER\" TO \"$ADMIN_USER\";"
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM pg_database WHERE datname = '$APP_DB_NAME'" | grep -q 1 || \
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
            "CREATE DATABASE \"$APP_DB_NAME\" OWNER \"$APP_DB_USER\";"
          psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
            "GRANT ALL PRIVILEGES ON DATABASE \"$APP_DB_NAME\" TO \"$APP_DB_USER\";"
  volumes:
    localHome:
      persistentVolumeClaim:
        storageClassName: standard
    sharedHome:
      storageClassName: standard

bitbucketSecrets:
  # License is stored in AWS SSM Parameter Store (SecureString), not here —
  # requires the external-secrets-operator devtool + ClusterSecretStore.
  licenseSsmParameter: "/devtools/bitbucket/license"
  admin:
    username: admin
    displayName: "Admin"
    emailAddress: "netanelzucaim100@gmail.com"
  # Shared admin password across argocd/bitbucket/confluence.
  adminPasswordSsmParameter: "/devtools/admin/password"
  db:
    username: "devtools"
    password: "bitbucket-db-2024"

rdsAdmin:
  usernameSsmParameter: "/devtools/rds/admin-username"
  passwordSsmParameter: "/devtools/rds/admin-password"
