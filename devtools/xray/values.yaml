# Overrides for JFrog Xray 3.124.20 running on the minikube-on-EC2 cluster.
# No public ingress — Xray is reached only through Artifactory's UI/router.
# Cross-namespace in-cluster Service DNS: xray namespace -> artifactory namespace.

xray:
  common:
    # Ensures the "xray" database/role exist on the shared RDS instance
    # before Xray starts — idempotent, safe to re-run on every pod restart.
    # Same pattern as devtools-definition/devtools/artifactory/values.yaml.
    customInitContainersBegin: |
      - name: ensure-postgres-db
        image: postgres:17-alpine
        env:
          - name: PGHOST
            value: "devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com"
          - name: PGPORT
            value: "5432"
          - name: ADMIN_USER
            valueFrom:
              secretKeyRef:
                name: rds-admin-credentials
                key: username
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: rds-admin-credentials
                key: password
          - name: APP_DB_NAME
            value: "xray"
          - name: APP_DB_USER
            valueFrom:
              secretKeyRef:
                name: xray-db
                key: username
          - name: APP_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: xray-db
                key: password
        command:
          - /bin/sh
          - -c
          - |
            set -eu
            psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
              "SELECT 1 FROM pg_roles WHERE rolname = '$APP_DB_USER'" | grep -q 1 || \
            psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
              "CREATE ROLE \"$APP_DB_USER\" LOGIN PASSWORD '$APP_DB_PASSWORD';"
            psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
              "ALTER ROLE \"$APP_DB_USER\" WITH PASSWORD '$APP_DB_PASSWORD';"
            psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
              "GRANT \"$APP_DB_USER\" TO \"$ADMIN_USER\";"
            psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
              "SELECT 1 FROM pg_database WHERE datname = '$APP_DB_NAME'" | grep -q 1 || \
            psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
              "CREATE DATABASE \"$APP_DB_NAME\" OWNER \"$APP_DB_USER\";"
            psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
              "GRANT ALL PRIVILEGES ON DATABASE \"$APP_DB_NAME\" TO \"$APP_DB_USER\";"

  # Xray's bundled RabbitMQ (its own internal task queue, not the shared
  # RDS) refuses to install with the chart's default password.
  rabbitmq:
    auth:
      password: "xray-rabbitmq-2024"
    # This is a genuinely first-time install: there is no pre-existing
    # xray-rabbitmq-0 pod/queues for the chart's "xray-pre-upgrade-hook"
    # PreSync Job to inspect. That hook (charts/xray/templates/migration-hook.yaml)
    # unconditionally runs `kubectl exec xray-rabbitmq-0 -- rabbitmqctl ...`
    # whenever rabbitmq.migration.enabled (default true), which fails forever
    # against a pod that doesn't exist yet, exhausts its backoffLimit, and
    # blocks ArgoCD from ever syncing the rest of Xray's resources (rabbitmq/
    # xray StatefulSets included) — this is why the Application's health was
    # "Missing" with nothing but failed hook-job pods in the namespace.
    # Disabling migration (and setting rabbitmqUpgradeReady per the chart's
    # own guard at migration-hook.yaml:14-16) skips the hook entirely, which
    # is safe here since there's no existing RabbitMQ data/feature-flags to
    # migrate. Re-enable migration.enabled the next time this chart version
    # is bumped after RabbitMQ already has data.
    migration:
      enabled: false
    rabbitmqUpgradeReady: true

  # Self-prefixed fields (chart quirk, see values.yaml comment in devtools-provision).
  xray:
    # Points at Artifactory's in-cluster Service (namespace "artifactory",
    # port 8082 = the router/UI port) — not the public ingress hostname,
    # since Cloudflare Access would block Xray's unattended API calls there.
    jfrogUrl: "http://artifactory.artifactory.svc.cluster.local:8082"
    # Must exactly match devtools-definition/devtools/artifactory/values.yaml's
    # artifactory.artifactory.masterKey/joinKey — this is how Xray joins
    # Artifactory's Access federation.
    masterKey: "24796f27c35ba50959f002cd4250e96620a2b229367dcc14eb6fc4e16ce1b8f7"
    joinKey: "084ac541e4965eda8498fe8a7c148cce"

xraySecrets:
  db:
    username: "devtools-apps"
    password: "xray-db-2024"
    # NOTE: Xray's system.yaml expects the native "postgres://" scheme, not
    # Artifactory's "jdbc:postgresql://" — see the two charts' files/system.yaml.
    # sslmode=require (not disable): the shared devtools-rds instance's
    # parameter group has rds.force_ssl=1, so a plaintext connection is
    # rejected by pg_hba.conf ("no pg_hba.conf entry ... no encryption") —
    # confirmed by the identical failure on Artifactory's "metadata" service
    # (see devtools-definition/devtools/artifactory/values.yaml). Xray's own
    # Postgres client hasn't hit this yet only because the pre-upgrade hook
    # above has always blocked it from ever starting.
    url: "postgres://devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com:5432/xray?sslmode=require"

rdsAdmin:
  usernameSsmParameter: "/devtools/rds/admin-username"
  passwordSsmParameter: "/devtools/rds/admin-password"
